### 🎨 COLORS & PALETTE
set $red        #f7768e
set $peach      #ff9e64
set $green      #9ece6a
set $teal       #73daca
set $sky        #89ddff
set $sapphire   #7dcfff
set $blue       #7aa2f7
set $magenta    #bb9af7
set $base       #1e1e2e
set $text       #c0caf5
set $mantle     #181825
set $overlay0   #6c7086

### 🖼️ WINDOW DECORATIONS
client.focused           $blue     $base       $text       $blue      $blue
client.focused_inactive  $mantle   $base       $text       $mantle    $mantle
client.unfocused         $mantle   $base       $text       $mantle    $mantle
client.urgent            $peach    $base       $peach      $overlay0  $peach
client.placeholder       $base     $base       $text       $overlay0  $overlay0
client.background        $base

### 📏 LAYOUT & GAPS
gaps inner 10
gaps outer 5
smart_gaps on
default_border pixel 2
default_floating_border pixel 2

### ✨ MODERN EFFECTS (SwayFX ready)
corner_radius 8
shadows enable
shadow_blur_radius 15
# dims an unfocused window (I don't like that)
#default_dim_inactive 0.15

### 🎈 FLOATING RULES
for_window [window_role="pop-up"] floating enable
for_window [window_role="bubble"] floating enable
for_window [window_type="dialog"] floating enable
for_window [app_id="pavucontrol"] floating enable, resize set 600 400
